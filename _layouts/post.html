---
layout: default
---
<article class="post-page" id = "post-page">
    <header class="post-page__header">
        <h1 class="post-page__title">{{ page.title }}</h1>
        <p class="post-page__metadata">
            <time class="posted-date" datetime="{{ page.date }}">
                {{ page.date | date: "%b %-d, %Y" }}
            </time>
        </p>
    </header>

    <article class="post-page__content">
        {{ content }}
    </article>

    <footer class="post-page__footer">
    </footer>
</article>
