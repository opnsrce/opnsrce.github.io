<header class="site__header">
    <div class="site__header-content">
        <a class="site__title" href="{{ site.baseurl }}/">{{ site.title }}</a>
        <nav class="site__nav">
            {% for my_page in site.pages %}
            <a class="nav-link" href="{{ my_page.url }}">
                {{ my_page.title }}
            </a>
            {% endfor %}
        </nav>
    </div>
</header>
